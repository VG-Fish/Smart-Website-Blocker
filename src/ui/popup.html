<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Smart Site Blocker (source)</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <h2>Smart Site Blocker</h2>
        <div id="status">Loading…</div>
        <div class="row">
            <label>Goal:</label>
            <div id="goalText">(not set)</div>
        </div>
        <div class="row">
            <label>Fun limit:</label>
            <div id="limitText">—</div>
        </div>
        <div class="row buttons">
            <button id="openOptions">Settings</button>
            <button id="disableBtn">Disable blocking (quiz)</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
