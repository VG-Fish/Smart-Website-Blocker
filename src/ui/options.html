<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Smart Site Blocker Settings (source)</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <h1>Settings</h1>

        <section class="settings-section">
            <h2 class="section-title">Learning Goals</h2>
            <label>Make each goal specific — e.g., "I want to learn about using superposition in circuits."</label>
            <div class="row">
                <input id="newGoalInput" type="text"
                    placeholder="e.g., I want to learn about using superposition in circuits." />
                <button id="addGoalBtn">Add Goal</button>
            </div>
            <div class="goals-divider">Added goals</div>
            <div id="goalsList"></div>
        </section>

        <section class="settings-section">
            <h2 class="section-title">Fun Time Limit</h2>
            <label>Minutes per day:</label>
            <input id="funLimit" type="number" min="0" />
            <div id="funLimitHint"></div>
        </section>

        <div class="api-note">
            To avoid storing sensitive API keys in extension storage, place your API keys in a local <code>.env</code>
            file at the extension root (this file is ignored by git). See README for details.
        </div>

        <div class="row buttons">
            <button id="genQuizBtn">Take quiz</button>
        </div>

        <div id="quizArea" style="display:none; margin-top:24px"></div>
    </div>

    <script src="options.js"></script>
</body>

</html>
